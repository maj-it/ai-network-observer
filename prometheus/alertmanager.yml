global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email-alerts'

receivers:
- name: 'email-alerts'
  email_configs:
  - to: 'votre-email@example.com'
    from: 'observer@network.local'
    smarthost: 'smtp.gmail.com:587'
    auth_username: 'security@example.com'
    auth_password: "${SMTP_PASSWORD:-changeme}"
